---
title: Email Form
---

<div class="container user-card">
	<form action="https://formspree.io/{{site.email}}" method="POST">
		<div class="row">
			<div class="col-md-5">
				<label for="name">Name</label>
				<input type="text" name="name" id="name" class="form-control"/>
			</div>
			<div class="col-md-5">
				<label for="email">Email</label>
				<input type="text" name="_replyto" id="email" class="form-control"/>
			</div>
		</div>
		<div class="row">  
			<div class="col-md-10 letter">
				<label for="message">Message</label>
				<textarea name="message" id="message" rows="6" class="form-control"></textarea>
			</div>
		</div>
		<div class="row">
			<ul class="list-group list-group-horizontal list-group-flush">
				<li class="list-group-item"><input type="submit" value="Send Message" class="btn btn-info" /></li>
				<li class="list-group-item"><input type="reset" value="Clear" class="btn btn-default"/></li>
			</ul>
		</div>
	</form>
</div>
